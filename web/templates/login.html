<!DOCTYPE html>
<html lang="ko" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 — 주통기 스캐너</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #0f172a; min-height: 100vh; display: flex; align-items: center; }
    .login-card { border: 1px solid #334155; background: #1e293b; }
    .login-card .card-header { background: #1e3a5f; border-bottom: 1px solid #334155; }
  </style>
</head>
<body>
<div class="container" style="max-width:400px">
  <div class="card login-card shadow-lg">
    <div class="card-header text-center py-4">
      <i class="bi bi-shield-lock-fill text-primary fs-1"></i>
      <h5 class="text-white mt-2 mb-0">주통기 취약점 스캐너</h5>
      <small class="text-secondary">주요정보통신기반시설 점검 시스템</small>
    </div>
    <div class="card-body p-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="post">
        <div class="mb-3">
          <label class="form-label text-secondary small">아이디</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-secondary">
              <i class="bi bi-person"></i>
            </span>
            <input type="text" name="username" class="form-control bg-dark border-secondary text-white"
                   placeholder="admin 또는 user" autofocus required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label text-secondary small">비밀번호</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary text-secondary">
              <i class="bi bi-lock"></i>
            </span>
            <input type="password" name="password" class="form-control bg-dark border-secondary text-white"
                   placeholder="비밀번호 입력" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>로그인
        </button>
      </form>

      <div class="mt-4 p-3 bg-dark rounded border border-secondary">
        <div class="text-secondary small mb-1">데모 계정</div>
        <div class="text-info small"><i class="bi bi-person-fill-gear me-1"></i>admin / admin123 <span class="badge bg-warning text-dark">관리자</span></div>
        <div class="text-info small mt-1"><i class="bi bi-person me-1"></i>user / user123 <span class="badge bg-secondary">일반</span></div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
